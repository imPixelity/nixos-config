[backdrop]
enabled = true

[bar.default]
background_opacity = 0.74999998323619366
end = [ "volume", "battery", "brightness", "session" ]
margin_ends = 10
position = "left"
start = [ "workspaces", "spacer_1", "media", "audio_visualizer" ]
widget_spacing = 8

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660.0

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 768.0
    cy = 745.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[shell]
app_icon_colorize = true
font_family = "JetBrainsMono Nerd Font"

    [shell.launcher]
    categories = false
    compact = true

    [shell.panel]
    control_center_placement = "floating"
    control_center_position = "center"
    session_placement = "floating"
    session_position = "center"
    transparency_mode = "glass"
    wallpaper_placement = "floating"
    wallpaper_position = "center"

    [shell.screen_corners]
    enabled = true

    [shell.screenshot]
    confirm_region = true
    directory = "/home/photon/Pictures/Screenshots"

[theme]
builtin = "Noctalia"
community_palette = "Ayu Blue"
mode = "dark"
source = "wallpaper"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "ghostty", "niri" ]

        [theme.templates.user.nvim-base16]
        input_path = "$XDG_CONFIG_HOME/nvim/lua/matugen-template.lua"
        output_path = "$XDG_CONFIG_HOME/nvim/lua/matugen.lua"
        post_hook = "pkill -SIGUSR1 nvim"

[wallpaper]
directory = "/home/photon/nixos-config/walls"
transition = [ "stripes" ]
transition_on_startup = true

    [wallpaper.automation]
    enabled = true

    [wallpaper.default]
    path = "/home/photon/nixos-config/walls/walls.png"

    [wallpaper.last]
    path = "/home/photon/nixos-config/walls/walls.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/photon/nixos-config/walls/walls.png"

[widget.audio_visualizer]
show_when_idle = true

[widget.media]
enabled = true
title_scroll = "always"

[widget.spacer_1]
type = "spacer"
